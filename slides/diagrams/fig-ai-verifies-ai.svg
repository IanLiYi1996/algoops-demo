<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#0052ff"/>
    </marker>
    <style>
      .mono{font-family:'JetBrains Mono',monospace}
      .h{fill:#0a0b0d;font-size:15px;font-weight:600}
      .sub{fill:#7c828a;font-size:12px}
    </style>
  </defs>

  <text x="36" y="40" fill="#0a0b0d" font-size="20" font-weight="700">「AI 验证 AI」· 根治"离线漂亮、上线翻车"</text>
  <text x="36" y="62" class="sub" font-size="13">不信宣称指标 —— Agent 在沙箱里真跑 benchmark,用实测数字对账</text>

  <!-- CLAIMED card -->
  <rect x="36" y="92" width="320" height="190" rx="16" fill="#ffffff" stroke="#dee1e6" stroke-width="1.5"/>
  <text x="60" y="124" class="h">CLAIMED · 宣称</text>
  <text x="60" y="146" class="sub">来自源材料 / 厂商 / 论文</text>
  <text x="60" y="186" class="mono" fill="#5b616e" font-size="22">Recall@10 = 0.82</text>
  <text x="60" y="220" class="sub">数据集、阈值、metric 定义</text>
  <text x="60" y="238" class="sub">可能与我们的语料不一致</text>
  <rect x="60" y="252" width="180" height="22" rx="11" fill="#fdecec"/>
  <text x="74" y="268" fill="#cf202f" font-size="12" font-weight="600">⚠ 未经验证 / 有泄漏风险</text>

  <!-- VERIFIED card -->
  <rect x="604" y="92" width="320" height="190" rx="16" fill="#ffffff" stroke="#0052ff" stroke-width="2"/>
  <text x="628" y="124" class="h">VERIFIED · 实测</text>
  <text x="628" y="146" class="sub">Code Interpreter 沙箱真跑</text>
  <text x="628" y="186" class="mono" fill="#0a0b0d" font-size="22">Recall@10 = 0.79</text>
  <text x="628" y="220" class="sub">seeded 合成评估集 · 确定可复现</text>
  <text x="628" y="238" class="sub">代码 + 数字一起留痕</text>
  <rect x="628" y="252" width="150" height="22" rx="11" fill="#e6f7ee"/>
  <text x="642" y="268" fill="#05b169" font-size="12" font-weight="600">✓ 实跑通过 · −3.6% 仍可用</text>

  <!-- middle: the agent re-runs -->
  <line x1="356" y1="187" x2="438" y2="187" stroke="#0052ff" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="438" y="150" width="128" height="74" rx="12" fill="#0052ff"/>
  <text x="502" y="182" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">AlgoOps</text>
  <text x="502" y="202" fill="#cfe0ff" font-size="11" text-anchor="middle">re-run &amp; 对账</text>
  <line x1="566" y1="187" x2="602" y2="187" stroke="#0052ff" stroke-width="2" marker-end="url(#ar)"/>

  <text x="36" y="316" class="sub" font-size="12.5" font-style="italic">结论:CLAIMED 0.82 vs VERIFIED 0.79 —— 宣称在我们的协议下基本成立;若实测 ≪ 宣称,这就是头条预警。</text>
</svg>
