<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340" font-family="Inter, system-ui, sans-serif">
  <style>
    .cap{fill:#0052ff;font-size:15px;font-weight:700}
    .role{fill:#0a0b0d;font-size:13px;font-weight:600}
    .sub{fill:#7c828a;font-size:11.5px}
    .pain{fill:#cf202f;font-size:11.5px}
  </style>

  <text x="36" y="38" fill="#0a0b0d" font-size="20" font-weight="700">AgentCore 能力映射 · 一个能力承担一件事</text>
  <text x="36" y="60" class="sub" font-size="13">2-3 个主线服务 + Skills 层,各自根治模型选型的一类痛点</text>

  <!-- Runtime -->
  <rect x="36" y="88" width="888" height="50" rx="12" fill="#0a0b0d"/>
  <text x="58" y="118" fill="#ffffff" font-size="15" font-weight="700">AgentCore Runtime</text>
  <text x="240" y="118" fill="#a8acb3" font-size="12.5">serverless ARM64 microVM · 托管整个 Strands Agent · 一条 cdk deploy 起全栈</text>

  <!-- three pillars -->
  <g>
    <rect x="36" y="156" width="284" height="150" rx="14" fill="#ffffff" stroke="#dee1e6" stroke-width="1.5"/>
    <text x="58" y="188" class="cap">Memory</text>
    <text x="58" y="210" class="role">沉淀 Persist</text>
    <text x="58" y="232" class="sub">SEMANTIC + SUMMARIZATION</text>
    <text x="58" y="250" class="sub">跨会话召回历次选型结论</text>
    <text x="58" y="288" class="pain">🔁 重复踩同一个坑</text>
  </g>
  <g>
    <rect x="338" y="156" width="284" height="150" rx="14" fill="#ffffff" stroke="#0052ff" stroke-width="2"/>
    <text x="360" y="188" class="cap">Code Interpreter</text>
    <text x="360" y="210" class="role">验证 Verify</text>
    <text x="360" y="232" class="sub">隔离沙箱真跑 benchmark</text>
    <text x="360" y="250" class="sub">Recall@K / NDCG@K / F1</text>
    <text x="360" y="288" class="pain">🤡 离线漂亮、上线翻车</text>
  </g>
  <g>
    <rect x="640" y="156" width="284" height="150" rx="14" fill="#ffffff" stroke="#dee1e6" stroke-width="1.5"/>
    <text x="662" y="188" class="cap">Skills</text>
    <text x="662" y="210" class="role">评估 Assess</text>
    <text x="662" y="232" class="sub">model-eval-card / benchmark-recsys</text>
    <text x="662" y="250" class="sub">+ huggingface/skills 复用</text>
    <text x="662" y="288" class="pain">🎲 评估无可复用方法论</text>
  </g>
</svg>
